<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coin Flip on Flow</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 { font-size: 2rem; margin-bottom: 0.25rem; }
    p  { color: #888; margin-bottom: 1.5rem; }
    #wallet-section { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
    #wallet-address { color: #64d2ff; font-size: 0.85rem; word-break: break-all; }
    .coin {
      font-size: 4rem;
      cursor: default;
      transition: transform 0.3s;
      margin: 1rem 0;
      user-select: none;
    }
    .coin.flipping { animation: spin 0.5s linear infinite; }
    @keyframes spin {
      from { transform: rotateY(0deg); }
      to   { transform: rotateY(720deg); }
    }
    .choices { display: flex; gap: 1.5rem; margin: 0.75rem 0; }
    .choices label { cursor: pointer; font-size: 1rem; }
    button {
      background: #1a6cf5;
      color: white;
      border: none;
      padding: 0.5rem 1.5rem;
      cursor: pointer;
      border-radius: 4px;
      margin: 0.25rem;
      font-family: monospace;
      font-size: 1rem;
    }
    button:hover { background: #2a7cff; }
    .result {
      font-size: 1.25rem;
      margin-top: 1rem;
      min-height: 1.75rem;
      text-align: center;
      color: #aef;
    }
    .history { margin-top: 2rem; width: 100%; max-width: 520px; }
    .history h3 { margin-bottom: 0.5rem; color: #888; font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase; }
    .flip-row {
      display: flex;
      justify-content: space-between;
      padding: 0.35rem 0;
      border-bottom: 1px solid #222;
      font-size: 0.9rem;
    }
    .flip-row span:last-child { color: #64d2ff; }
  </style>
</head>
<body>
  <h1>Coin Flip on Flow</h1>
  <p>Provably fair &middot; Gasless &middot; On-chain</p>

  <div id="wallet-section">
    <button id="connect-btn">Connect Wallet</button>
    <span id="wallet-address"></span>
  </div>

  <div id="game-section" style="display:none; text-align:center;">
    <div class="coin" id="coin">🪙</div>
    <div class="choices">
      <label><input type="radio" name="choice" value="heads" checked /> Heads</label>
      <label><input type="radio" name="choice" value="tails" /> Tails</label>
    </div>
    <button id="flip-btn">Flip!</button>
    <div class="result" id="result"></div>
  </div>

  <div class="history" id="history"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
